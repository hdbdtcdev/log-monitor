server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Reverse proxy tới các service — tránh CORS
    location /api/collector/ {
        proxy_pass http://log-collector:4000/;
    }

    location /api/opensearch/ {
        proxy_pass https://opensearch:9200/;
        proxy_ssl_verify off;
    }

    location /api/fluent-bit/ {
        proxy_pass http://fluent-bit:2020/;
    }

    location /api/dashboards/ {
        proxy_pass http://opensearch-dashboards:5601/;
    }
}
