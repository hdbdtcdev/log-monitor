<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LogStack Health</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0f172a;color:#e2e8f0;min-height:100vh;padding:2rem}
  h1{text-align:center;font-size:1.5rem;margin-bottom:.5rem;color:#f8fafc}
  .subtitle{text-align:center;color:#64748b;font-size:.85rem;margin-bottom:2rem}
  .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:1.25rem;max-width:1000px;margin:0 auto}
  .card{background:#1e293b;border-radius:12px;padding:1.25rem;border:1px solid #334155;transition:border-color .3s}
  .card.ok{border-color:#22c55e40}
  .card.err{border-color:#ef444440}
  .card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem}
  .card-title{font-size:1rem;font-weight:600}
  .badge{font-size:.75rem;padding:.2rem .6rem;border-radius:9999px;font-weight:600}
  .badge.ok{background:#22c55e20;color:#4ade80}
  .badge.err{background:#ef444420;color:#f87171}
  .badge.loading{background:#f59e0b20;color:#fbbf24}
  .meta{display:flex;flex-direction:column;gap:.5rem}
  .meta-row{display:flex;justify-content:space-between;font-size:.82rem}
  .meta-label{color:#94a3b8}
  .meta-value{color:#cbd5e1;font-family:'SF Mono',monospace;font-size:.8rem}
  .refresh-bar{text-align:center;margin-top:2rem;color:#475569;font-size:.78rem}
  #timer{color:#94a3b8}
</style>
</head>
<body>

<h1>LogStack Health Dashboard</h1>
<p class="subtitle">Auto-refresh mỗi 30 giây</p>

<div class="grid">
  <div class="card" id="card-collector">
    <div class="card-header">
      <span class="card-title">Log Collector</span>
      <span class="badge loading" id="badge-collector">...</span>
    </div>
    <div class="meta" id="meta-collector"></div>
  </div>

  <div class="card" id="card-opensearch">
    <div class="card-header">
      <span class="card-title">OpenSearch</span>
      <span class="badge loading" id="badge-opensearch">...</span>
    </div>
    <div class="meta" id="meta-opensearch"></div>
  </div>

  <div class="card" id="card-fluentbit">
    <div class="card-header">
      <span class="card-title">Fluent Bit</span>
      <span class="badge loading" id="badge-fluentbit">...</span>
    </div>
    <div class="meta" id="meta-fluentbit"></div>
  </div>

  <div class="card" id="card-dashboards">
    <div class="card-header">
      <span class="card-title">Dashboards</span>
      <span class="badge loading" id="badge-dashboards">...</span>
    </div>
    <div class="meta" id="meta-dashboards"></div>
  </div>
</div>

<p class="refresh-bar">Cập nhật sau <span id="timer">30</span>s &middot; <span id="last-update">—</span></p>

<script>
const REFRESH = 30;
let countdown = REFRESH;

function setBadge(id, ok, text) {
  const b = document.getElementById('badge-' + id);
  const c = document.getElementById('card-' + id);
  b.textContent = text || (ok ? 'OK' : 'DOWN');
  b.className = 'badge ' + (ok ? 'ok' : 'err');
  c.className = 'card ' + (ok ? 'ok' : 'err');
}

function setMeta(id, rows) {
  const el = document.getElementById('meta-' + id);
  el.innerHTML = rows.map(([l, v]) =>
    `<div class="meta-row"><span class="meta-label">${l}</span><span class="meta-value">${v}</span></div>`
  ).join('');
}

function fmt(sec) {
  if (sec < 60) return sec.toFixed(0) + 's';
  if (sec < 3600) return (sec / 60).toFixed(1) + 'm';
  return (sec / 3600).toFixed(1) + 'h';
}

async function fetchJSON(url) {
  const r = await fetch(url, { signal: AbortSignal.timeout(5000) });
  return r.json();
}

async function checkCollector() {
  try {
    const d = await fetchJSON('/api/collector/health');
    setBadge('collector', true);
    setMeta('collector', [
      ['Uptime', fmt(d.uptime)],
      ['Forwarded', d.totalForwarded?.toLocaleString() ?? '—'],
      ['Errors', d.forwardErrors ?? 0],
    ]);
  } catch {
    setBadge('collector', false);
    setMeta('collector', [['Lỗi', 'Không kết nối được']]);
  }
}

async function checkOpenSearch() {
  try {
    const d = await fetchJSON('/api/opensearch/_cluster/health');
    const ok = d.status === 'green' || d.status === 'yellow';
    setBadge('opensearch', ok, d.status?.toUpperCase());
    setMeta('opensearch', [
      ['Cluster', d.cluster_name],
      ['Nodes', d.number_of_nodes],
      ['Indices', d.active_primary_shards],
      ['Status', d.status],
    ]);
  } catch {
    setBadge('opensearch', false);
    setMeta('opensearch', [['Lỗi', 'Không kết nối được']]);
  }
}

async function checkFluentBit() {
  try {
    const d = await fetchJSON('/api/fluent-bit/api/v1/uptime');
    setBadge('fluentbit', true);
    setMeta('fluentbit', [
      ['Uptime', fmt(d.uptime_sec ?? 0)],
    ]);
    try {
      const m = await fetchJSON('/api/fluent-bit/api/v1/metrics');
      const inp = m?.input?.['mobile.http'] ?? {};
      setMeta('fluentbit', [
        ['Uptime', fmt(d.uptime_sec ?? 0)],
        ['Records', inp.records?.toLocaleString() ?? '—'],
        ['Bytes', inp.bytes?.toLocaleString() ?? '—'],
      ]);
    } catch { /* metrics optional */ }
  } catch {
    setBadge('fluentbit', false);
    setMeta('fluentbit', [['Lỗi', 'Không kết nối được']]);
  }
}

async function checkDashboards() {
  try {
    const r = await fetch('/api/dashboards/api/status', { signal: AbortSignal.timeout(5000) });
    setBadge('dashboards', r.ok);
    setMeta('dashboards', [
      ['HTTP', r.status],
      ['URL', 'http://VPS_IP:5601'],
    ]);
  } catch {
    setBadge('dashboards', false);
    setMeta('dashboards', [['Lỗi', 'Không kết nối được']]);
  }
}

async function refreshAll() {
  await Promise.allSettled([checkCollector(), checkOpenSearch(), checkFluentBit(), checkDashboards()]);
  document.getElementById('last-update').textContent = new Date().toLocaleTimeString('vi-VN');
  countdown = REFRESH;
}

setInterval(() => {
  countdown--;
  document.getElementById('timer').textContent = countdown;
  if (countdown <= 0) refreshAll();
}, 1000);

refreshAll();
</script>
</body>
</html>
