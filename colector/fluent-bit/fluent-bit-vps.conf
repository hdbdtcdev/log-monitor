[SERVICE]
    Flush         1
    Daemon        Off
    Log_Level     info
    Parsers_File  parsers.conf
    HTTP_Server   On
    HTTP_Listen   0.0.0.0
    HTTP_Port     2020

# ============================================================
# INPUT: HTTP — nhận log từ Log Collector
# ============================================================
[INPUT]
    Name          http
    Listen        0.0.0.0
    Port          8888
    Tag           mobile.http

# ============================================================
# FILTER: thêm timestamp ingested
# ============================================================
[FILTER]
    Name          lua
    Match         mobile.*
    script        /fluent-bit/etc/add_timestamp.lua
    call          add_timestamp

# ============================================================
# OUTPUT: OpenSearch — ghi trực tiếp vào cluster
# ============================================================
[OUTPUT]
    Name              opensearch
    Match             mobile.*
    Host              opensearch
    Port              9200
    HTTP_User         admin
    HTTP_Passwd       ${OPENSEARCH_PASS}
    Index             mobile-logs
    Type              _doc
    Suppress_Type_Name On
    tls               On
    tls.verify        Off
    Logstash_Format   On
    Logstash_Prefix   mobile-logs
    Logstash_DateFormat %Y.%m.%d
    Replace_Dots      On
    Retry_Limit       5
    Buffer_Size       4M
