[SERVICE]
    Flush         1
    Daemon        Off
    Log_Level     info
    Parsers_File  parsers.conf
    HTTP_Server   On
    HTTP_Listen   0.0.0.0
    HTTP_Port     2020

# ============================================================
# INPUT 1: HTTP (direct JSON from app)
# ============================================================
[INPUT]
    Name          http
    Listen        0.0.0.0
    Port          8888
    Tag           mobile.http

# ============================================================
# INPUT 2: File tail (read log files)
# ============================================================
[INPUT]
    Name          tail
    Path          /logs/*.log
    Tag           mobile.file
    Parser        mobile_log
    Refresh_Interval 5
    Read_from_Head   On
    DB            /fluent-bit/etc/tail.db

# ============================================================
# FILTERS for HTTP input
# ============================================================
[FILTER]
    Name          modify
    Match         mobile.http
    Add           source http_direct
    Add           environment development

[FILTER]
    Name          lua
    Match         mobile.http
    script        /fluent-bit/etc/add_timestamp.lua
    call          add_timestamp

# ============================================================
# FILTERS for File input — parse KV pairs
# ============================================================
[FILTER]
    Name          lua
    Match         mobile.file
    script        /fluent-bit/etc/parse_kv.lua
    call          parse_kv

[FILTER]
    Name          modify
    Match         mobile.file
    Add           source file_tail
    Add           environment development

# ============================================================
# OUTPUTS
# ============================================================

# Stdout for debugging
[OUTPUT]
    Name          stdout
    Match         mobile.*
    format        json_lines

# Gửi log qua Cloudflare Tunnel → Log Collector API Gateway
[OUTPUT]
    Name          http
    Match         mobile.*
    Host          api.logstack.store
    Port          443
    URI           /logs/mobile
    Format        json
    json_date_key @timestamp
    json_date_format iso8601
    Header        Content-Type application/json
    tls           On
    tls.verify    On
    Retry_Limit   3
