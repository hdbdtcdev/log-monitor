services:
  # ──────────────────────────────────────
  # OpenSearch — lưu trữ log
  # ──────────────────────────────────────
  opensearch:
    image: opensearchproject/opensearch:2.18.0
    container_name: opensearch
    environment:
      - discovery.type=single-node
      - OPENSEARCH_JAVA_OPTS=-Xms256m -Xmx256m
      - OPENSEARCH_INITIAL_ADMIN_PASSWORD=${OPENSEARCH_PASS:-Admin@12345!}
      - DISABLE_SECURITY_PLUGIN=false
      - bootstrap.memory_lock=true
    ulimits:
      memlock: { soft: -1, hard: -1 }
      nofile: { soft: 65536, hard: 65536 }
    volumes:
      - opensearch-data:/usr/share/opensearch/data
    ports:
      - "9200:9200"
    deploy:
      resources:
        limits:
          memory: 768M
    healthcheck:
      test:
        - "CMD-SHELL"
        - 'curl -s -k -u "admin:$${OPENSEARCH_INITIAL_ADMIN_PASSWORD}" https://localhost:9200 | grep -q ''"tagline"'''
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 60s
    restart: unless-stopped

  # ──────────────────────────────────────
  # OpenSearch Dashboards — UI
  # ──────────────────────────────────────
  dashboards:
    image: opensearchproject/opensearch-dashboards:2.18.0
    container_name: opensearch-dashboards
    environment:
      - OPENSEARCH_HOSTS=["https://opensearch:9200"]
      - OPENSEARCH_USERNAME=admin
      - OPENSEARCH_PASSWORD=${OPENSEARCH_PASS:-Admin@12345!}
      - OPENSEARCH_SSL_VERIFICATIONMODE=none
      - DISABLE_SECURITY_DASHBOARDS_PLUGIN=false
    ports:
      - "5601:5601"
    deploy:
      resources:
        limits:
          memory: 896M
    depends_on:
      opensearch:
        condition: service_healthy
    restart: unless-stopped

  # ──────────────────────────────────────
  # Fluent Bit — pipeline nhận log → ghi OpenSearch
  # ──────────────────────────────────────
  fluent-bit:
    image: fluent/fluent-bit:3.0
    container_name: fluent-bit
    environment:
      - OPENSEARCH_PASS=${OPENSEARCH_PASS:-Admin@12345!}
    volumes:
      - ./fluent-bit/fluent-bit-vps.conf:/fluent-bit/etc/fluent-bit.conf:ro
      - ./fluent-bit/parsers.conf:/fluent-bit/etc/parsers.conf:ro
      - ./fluent-bit/add_timestamp.lua:/fluent-bit/etc/add_timestamp.lua:ro
    deploy:
      resources:
        limits:
          memory: 64M
    depends_on:
      opensearch:
        condition: service_healthy
    restart: unless-stopped

  # ──────────────────────────────────────
  # Log Collector — Node.js API nhận log từ mobile
  # ──────────────────────────────────────
  log-collector:
    build: .
    container_name: log-collector
    environment:
      - NODE_ENV=production
      - PORT=4000
      - FLUENT_BIT_URL=http://fluent-bit:8888
      - LOG_LEVEL=info
      - RATE_LIMIT=${RATE_LIMIT:-100}
    ports:
      - "4000:4000"
    deploy:
      resources:
        limits:
          memory: 128M
    depends_on:
      - fluent-bit
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:4000/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ──────────────────────────────────────
  # Cloudflare Tunnel — expose ra internet
  # ──────────────────────────────────────
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: cloudflared
    command: tunnel --no-tls-verify run --token ${CLOUDFLARE_TUNNEL_TOKEN}
    deploy:
      resources:
        limits:
          memory: 64M
    depends_on:
      - log-collector
      - dashboards
    restart: unless-stopped

  # ──────────────────────────────────────
  # Health Dashboard — trang web theo dõi hệ thống
  # ──────────────────────────────────────
  health-dashboard:
    image: nginx:alpine
    container_name: health-dashboard
    ports:
      - "3000:80"
    volumes:
      - ./health-dashboard/index.html:/usr/share/nginx/html/index.html:ro
      - ./health-dashboard/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    deploy:
      resources:
        limits:
          memory: 32M
    depends_on:
      - log-collector
      - opensearch
      - fluent-bit
    restart: unless-stopped

volumes:
  opensearch-data:
